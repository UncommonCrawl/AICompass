name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_COMPASS_SUBMIT_ENDPOINT: ${{ secrets.VITE_COMPASS_SUBMIT_ENDPOINT }}
      VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Validate Firebase service account secret
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AI_COMPASS_B430A }}
        run: |
          node -e '
          const raw = process.env.FIREBASE_SERVICE_ACCOUNT_JSON || "";
          let parsed;
          try {
            parsed = JSON.parse(raw);
          } catch {
            throw new Error("FIREBASE_SERVICE_ACCOUNT_AI_COMPASS_B430A must be the full downloaded Firebase service account JSON.");
          }
          if (parsed.type !== "service_account" || !parsed.client_email || !parsed.private_key || !parsed.project_id) {
            throw new Error("FIREBASE_SERVICE_ACCOUNT_AI_COMPASS_B430A is missing required service account JSON fields.");
          }
          '

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AI_COMPASS_B430A }}
          projectId: ai-compass-b430a
          channelId: live
